<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>
        Create Trip
    </title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <a href="/pegawai/trip"
       class="btn btn-warning mb-3">
        Back
    </a>
    <div class="card p-4">
        <h2>
            Create Business Trip
        </h2>
        <form
                th:action="@{/pegawai/trip/save}"
                method="post">
            <div class="mb-3">
                <label>
                    Purpose
                </label>
                <input
                        name="purpose"
                        class="form-control"
                        placeholder="Purpose">
            </div>
            <div class="mb-3">
                <label>
                    Departure Date
                </label>
                <input
                        type="date"
                        name="departureDate"
                        class="form-control">
            </div>
            <div class="mb-3">
                <label>
                    Return Date
                </label>
                <input
                        type="date"
                        name="returnDate"
                        class="form-control">
            </div>
            <div class="mb-3">
                <label>
                    Origin City
                </label>
                <select
                        name="originCityId"
                        class="form-control">
                    <option
                            value="">
                        Select City
                    </option>
                    <option
                            th:each="city : ${cities}"
                            th:value="${city.id}"
                            th:text="${city.cityName}">
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label>
                    Destination City
                </label>
                <select
                        name="destinationCityId"
                        class="form-control">
                    <option
                            value="">
                        Select City
                    </option>
                    <option
                            th:each="city : ${cities}"
                            th:value="${city.id}"
                            th:text="${city.cityName}">
                    </option>
                </select>
            </div>
            <button
                    class="btn btn-success">
                Submit
            </button>
        </form>
    </div>
</div>
</body>
</html>
