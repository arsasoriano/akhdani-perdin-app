<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>
        Add City
    </title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card p-4">
        <h2>
            Add City
        </h2>
        <form
                th:action="@{/admin/city/update/{id}(id=${city.id})}"
                method="post">
            <input
                    name="cityName"
                    th:value="${city.cityName}"
                    class="form-control mb-2"
                    placeholder="City Name">
            <input
                    name="latitude"
                    th:value="${city.latitude}"
                    class="form-control mb-2"
                    placeholder="Latitude">
            <input
                    name="longitude"
                    th:value="${city.longitude}"
                    class="form-control mb-2"
                    placeholder="Longitude">
            <input
                    name="province"
                    th:value="${city.province}"
                    class="form-control mb-2"
                    placeholder="Province">
            <input
                    name="island"
                    th:value="${city.island}"
                    class="form-control mb-2"
                    placeholder="Island">
            <label>
                Luar Negeri
            </label>

            <select
                    name="luarNegeri"
                    class="form-control">
                <option
                        value="false"
                        th:selected="${city.luarNegeri == false}">
                    Tidak
                </option>
                <option
                        value="true"
                        th:selected="${city.luarNegeri == true}">
                    Ya
                </option>
            </select>
            <button
                    class="btn btn-success mt-3">
                Save
            </button>
        </form>
    </div>
</div>
</body>
</html>
