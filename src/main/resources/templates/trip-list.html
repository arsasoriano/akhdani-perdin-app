<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>
        My Business Trip
    </title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>
            My Business Trip
        </h2>
        <div>
            <a
                    href="/pegawai/dashboard"
                    class="btn btn-secondary">
                Dashboard
            </a>
            <a
                    href="/pegawai/trip/create"
                    class="btn btn-primary">
                Create Trip
            </a>
        </div>
    </div>
    <div class="card shadow p-3">
        <table
                class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Purpose</th>
                <th>Departure Date</th>
                <th>Return Date</th>
                <th>Origin City</th>
                <th>Destination City</th>
                <th>Duration</th>
                <th>Allowance</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr
                    th:if="${#lists.isEmpty(trips)}">
                <td
                        colspan="9"
                        class="text-center">
                    No Business Trip Data
                </td>
            </tr>
            <tr
                    th:each="trip, iterStat : ${trips}">
                <td
                        th:text="${iterStat.count}">
                </td>
                <td
                        th:text="${trip.purpose}">
                </td>
                <td
                        th:text="${trip.departureDate}">
                </td>
                <td
                        th:text="${trip.returnDate}">
                </td>
                <td
                        th:text="${trip.originCity.cityName}">
                </td>
                <td
                        th:text="${trip.destinationCity.cityName}">
                </td>
                <td
                        th:text="${trip.duration + ' Day(s)'}">
                </td>
                <td
                        th:text="${'Rp ' + #numbers.formatDecimal(trip.allowance, 0, 'POINT', 0, 'COMMA')}">
                </td>
                <td>
                    <span
                            class="badge bg-warning"
                            th:if="${trip.status.name() == 'PENDING'}"
                            th:text="${trip.status}">
                    </span>
                    <span
                            class="badge bg-success"
                            th:if="${trip.status.name() == 'APPROVED'}"
                            th:text="${trip.status}">
                    </span>
                    <span
                            class="badge bg-danger"
                            th:if="${trip.status.name() == 'REJECTED'}"
                            th:text="${trip.status}">
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-3">
        <a
                href="/logout"
                class="btn btn-danger">
            Logout
        </a>
    </div>
</div>
</body>
</html>
