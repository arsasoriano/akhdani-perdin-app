<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>
        City List
    </title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>
        Master Kota
    </h2>
    <a
            href="/admin/city/create"
            class="btn btn-primary mb-3">
        Add City
    </a>
    <a
            href="/admin/dashboard"
            class="btn btn-secondary mb-3">
        Dashboard
    </a>
    <table
            class="table table-bordered">
        <thead>
        <tr>
            <th>Name</th>
            <th>Province</th>
            <th>Island</th>
            <th>Luar Negeri</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr
                th:each="city : ${cities}">
            <td
                    th:text="${city.cityName}">
            </td>
            <td
                    th:text="${city.province}">
            </td>
            <td
                    th:text="${city.island}">
            </td>
            <td
                    th:text="${city.luarNegeri}">
            </td>
            <td>
                <a
                        th:href="@{/admin/city/edit/{id}(id=${city.id})}"
                        class="btn btn-warning">
                    Edit
                </a>
                <form
                        th:action=
                                "@{/admin/city/delete/{id}(id=${city.id})}"

                        method="post"

                        style="display:inline;">

                    <input
                            type="hidden"
                            name="_method"
                            value="delete"/>

                    <button
                            type="submit"
                            class="btn btn-danger btn-sm">

                        Delete

                    </button>

                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
