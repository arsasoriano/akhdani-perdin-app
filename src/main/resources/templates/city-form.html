<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>
        Add City
    </title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <a href="/admin/city"
       class="btn btn-warning mb-3">
        Back
    </a>
    <div class="card p-4">
        <h2>
            Add City
        </h2>
        <form
                th:action="@{/admin/city/save}"
                method="post">
            <input
                    name="cityName"
                    class="form-control mb-2"
                    placeholder="City Name">
            <input
                    name="latitude"
                    class="form-control mb-2"
                    placeholder="Latitude">
            <input
                    name="longitude"
                    class="form-control mb-2"
                    placeholder="Longitude">
            <input
                    name="province"
                    class="form-control mb-2"
                    placeholder="Province">
            <input
                    name="island"
                    class="form-control mb-2"
                    placeholder="Island">
            <label>
                Luar Negeri
            </label>

            <select
                    name="luarNegeri"
                    class="form-control">
                <option value="false">
                    Tidak
                </option>
                <option value="true">
                    Ya
                </option>
            </select>
            <button
                    class="btn btn-success mt-3">
                Save
            </button>
        </form>
    </div>
</div>
</body>
</html>
