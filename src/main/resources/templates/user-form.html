<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>
        Add User
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<body>
<div class="container mt-4">
    <a href="/admin/user"
       class="btn btn-warning mb-3">
        Back
    </a>
    <div class="card p-4">

        <h2>
            Add User
        </h2>

        <form
                th:action=
                        "@{/admin/user/save}"

                method="post">

            <input
                    name="username"
                    class="form-control mb-2"
                    placeholder="Username">

            <input
                    type="password"
                    name="password"
                    class="form-control mb-2"
                    placeholder="Password">

            <select
                    name="role"
                    class="form-control">

                <option
                        th:each=
                                "role : ${roles}"

                        th:value=
                                "${role}"

                        th:text=
                                "${role}">
                </option>

            </select>

            <button
                    class=
                            "btn btn-success mt-3">

                Save

            </button>

        </form>

    </div>

</div>

</body>

</html>
